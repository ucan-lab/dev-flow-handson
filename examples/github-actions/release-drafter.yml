name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "🚀 Features"
    labels: [feature, enhancement]
  - title: "🐛 Bug Fixes"
    labels: [bug, fix]
  - title: "🧹 Chores"
    labels: [chore, refactor, docs]
change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'
version-resolver:
  major:
    labels: [major]
  minor:
    labels: [feature, enhancement]
  patch:
    labels: [bug, fix]
  default: patch
template: |
  ## 変更点

  $CHANGES
